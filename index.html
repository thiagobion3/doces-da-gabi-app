<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doces da Gabi</title>

<link rel="stylesheet" href="styles.css?v=3">
</head>

<body>

<header class="topo">
  <h1>🍰 Doces da Gabi</h1>
  <button class="btn-sync">Sync</button>
</header>

<main>

<section class="hero">
  <h2>Seu atalho diário para vender mais com carinho.</h2>
  <p>Escolha uma ação rápida para registrar pedidos, acompanhar reservas e cuidar de cada detalhe.</p>
</section>

<section class="grid">

  <button class="card principal">
    <span class="icone">➕</span>
    <span>Novo Pedido</span>
  </button>

  <button class="card">
    <span class="icone">📦</span>
    <span>Pedidos</span>
  </button>

  <button class="card">
    <span class="icone">📅</span>
    <span>Reservas</span>
  </button>

  <button class="card">
    <span class="icone">📊</span>
    <span>Relatórios</span>
  </button>

  <button class="card">
    <span class="icone">🍰</span>
    <span>Produtos</span>
  </button>

  <button class="card">
    <span class="icone">👤</span>
    <span>Clientes</span>
  </button>

</section>

</main>

</body>
</html>
