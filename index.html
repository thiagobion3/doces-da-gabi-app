<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doces da Gabi</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header class="topo">
  <button onclick="voltar()">←</button>
  <h1 id="titulo-app">🍰 Doces da Gabi</h1>
  <button onclick="abrirTela('config')">⚙️</button>
</header>

<main>

<!-- HOME -->
<section id="home" class="tela ativa">
  <button onclick="abrirCampanhaAtiva()">🔥 Campanha Ativa</button>
  <button onclick="abrirTela('campanhas')">📢 Campanhas</button>
  <button onclick="abrirTela('cadastros')">🧾 Cadastros</button>
  <button onclick="abrirTela('relatorios')">📊 Relatórios</button>
</section>

<!-- CAMPANHAS -->
<section id="campanhas" class="tela">
  <h2>Campanhas</h2>

  <input id="nome-campanha" placeholder="Nome">
  <input id="data-campanha" type="date">
  <button onclick="criarCampanha()">Salvar</button>

  <div id="lista-campanhas"></div>
</section>

<!-- CAMPANHA -->
<section id="campanha" class="tela">
  <h2 id="titulo-campanha"></h2>

  <input id="cliente" placeholder="Cliente">

  <select id="produto"></select>
  <input id="quantidade" type="number" value="1">

  <button onclick="addItem()">Adicionar Item</button>

  <div id="itens"></div>

  <button onclick="salvarPedido()">Salvar Pedido</button>
</section>

<!-- CADASTROS -->
<section id="cadastros" class="tela">
  <button onclick="abrirTela('produtos')">Produtos</button>
  <button onclick="abrirTela('clientes')">Clientes</button>
</section>

<!-- PRODUTOS -->
<section id="produtos" class="tela">
  <input id="nome-produto" placeholder="Produto">
  <input id="preco-produto" placeholder="Preço">
  <button onclick="salvarProduto()">Salvar</button>
  <div id="lista-produtos"></div>
</section>

<!-- CLIENTES -->
<section id="clientes" class="tela">
  <input id="nome-cliente" placeholder="Cliente">
  <button onclick="salvarCliente()">Salvar</button>
  <div id="lista-clientes"></div>
</section>

<!-- RELATÓRIOS -->
<section id="relatorios" class="tela">
  <h2>Relatórios</h2>

  <input id="mes" placeholder="Mês">
  <input id="ano" placeholder="Ano">

  <button onclick="gerarRelatorio()">Gerar</button>

  <div id="resultado"></div>
</section>

<!-- CONFIG -->
<section id="config" class="tela">
  <input id="config-url" placeholder="Supabase URL">
  <input id="config-key" placeholder="Anon Key">
  <button onclick="salvarConfig()">Salvar</button>
</section>

</main>

<footer>
  © 2026 by Bion
</footer>

<script src="supabase.js"></script>
<script src="app.js"></script>

</body>
</html>
